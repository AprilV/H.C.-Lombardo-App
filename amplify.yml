version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
    build:
      commands:
        - npm run build
        - |
          BUILD_DIR="build"
          if [ ! -f "$BUILD_DIR/index.html" ] && [ -f "frontend/build/index.html" ]; then
            BUILD_DIR="frontend/build"
          fi

          # Mirror BrowserRouter entry routes so direct deep-links resolve without console rewrites.
          routes=(
            "team-stats"
            "team-comparison"
            "matchup-analyzer"
            "analytics"
            "game-statistics"
            "historical-data"
            "ml-predictions"
            "ml-predictions-redesign"
            "ml-predictions-old"
            "model-performance"
            "settings"
            "admin"
          )

          for route in "${routes[@]}"; do
            mkdir -p "$BUILD_DIR/$route"
            cp "$BUILD_DIR/index.html" "$BUILD_DIR/$route/index.html"
          done

          # Mirror team detail routes for all canonical NFL abbreviations.
          teams=(ARI ATL BAL BUF CAR CHI CIN CLE DAL DEN DET GB HOU IND JAX KC LAC LAR LV MIA MIN NE NO NYG NYJ PHI PIT SEA SF TB TEN WAS)
          for team in "${teams[@]}"; do
            mkdir -p "$BUILD_DIR/team/$team"
            cp "$BUILD_DIR/index.html" "$BUILD_DIR/team/$team/index.html"
          done
  artifacts:
    baseDirectory: frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/index.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache'
# Recommended: also configure a global SPA rewrite in Amplify Console when available.
# This build includes route mirroring fallback so core deep-links still resolve.
