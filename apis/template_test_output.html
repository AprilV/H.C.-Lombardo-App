<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Test</title>
    
    

    <style>
        /* Base styles that can be extended */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
            color: white;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .nav-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 25px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            display: block;
        }
        
        .nav-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            color: #FFD700;
        }
        
        .nav-card h3 {
            margin-top: 0;
            font-size: 1.3rem;
            color: #FFD700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-card p {
            margin-bottom: 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }
        
        .icon {
            font-size: 1.5rem;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        .api-status {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .template-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .feature-highlight {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            border-left: 4px solid #FFD700;
        }
    </style>
    
<style>
    .feature-list {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 20px;
        margin: 20px 0;
    }
    
    .feature-item {
        margin: 10px 0;
        padding: 8px 15px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 5px;
        border-left: 3px solid #FFD700;
    }
</style>

</head>
<body>
    
    <div class="template-badge">🔧 Jinja2 Extended</div>
    
    
    <div class="container">
        
        <div class="api-status">🟢 API Active</div>
        
        
        
        <h1>🧪 Template Test</h1>
        <p class="subtitle">Testing Jinja2 template inheritance</p>
        
        
        
    
    <div class="feature-list">
        <h3 style="margin-top: 0; color: #FFD700;">✨ Features</h3>
        
        <div class="feature-item">Template inheritance</div>
        
        <div class="feature-item">Dynamic content</div>
        
        <div class="feature-item">CSS styling</div>
        
    </div>
    
    
    <div class="nav-grid">
        
        <a href="/test" class="nav-card">
            <h3><span class="icon">🧪</span> Test Link</h3>
            <p>This is a test navigation link</p>
        </a>
        
    </div>
    
    

        
        
        <div class="footer">
            <p>Template Test Complete</p>
            <p>Professional template rendering with inheritance</p>
        </div>
        
    </div>
</body>
</html>
