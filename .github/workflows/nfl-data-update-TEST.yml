name: NFL Data Update (TEST SCHEMA ONLY)

on:
  # Manual trigger only - no automatic schedule
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Seasons to update'
        required: false
        default: '2025'

jobs:
  test-update:
    runs-on: ubuntu-latest
    name: Test NFL Database Update (hcl_test schema)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Verify SSM connectivity
        run: |
          echo "🔍 Checking EC2 SSM registration..."
          aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text
      
      - name: Pull latest code on EC2
        run: |
          echo "📥 Pulling latest code from GitHub..."
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "TEST: Pull latest code" \
            --parameters 'commands=[
              "cd /home/ubuntu/H.C.-Lombardo-App && git pull origin master || echo Already up to date"
            ]' \
            --output text \
            --query "Command.CommandId")
          
          echo "Command ID: $COMMAND_ID"
          
          aws ssm wait command-executed \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --command-id $COMMAND_ID
          
          echo "✅ Git pull output:"
          aws ssm get-command-invocation \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --command-id $COMMAND_ID \
            --query "StandardOutputContent" \
            --output text
      
      # Skipping git pull - using existing code on EC2
      
      - name: Load data to TEST schema (hcl_test)
        run: |
          SEASONS="${{ github.event.inputs.seasons || '2025' }}"
          echo "⚠️ TESTING MODE - Loading to hcl_test schema"
          echo "Seasons: $SEASONS"
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "TEST: Load NFL data to hcl_test schema" \
            --timeout-seconds 600 \
            --parameters "commands=[
              \"cd /home/ubuntu/H.C.-Lombardo-App && . venv/bin/activate && python scripts/data_loading/ingest_historical_games.py --testbed --seasons $SEASONS\"
            ]" \
            --output text \
            --query "Command.CommandId")
          
          echo "Command ID: $COMMAND_ID"
          
          # Wait for command to complete
          echo "⏳ Waiting for command to complete..."
          sleep 30
          
          # Check status
          STATUS=$(aws ssm get-command-invocation \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --command-id $COMMAND_ID \
            --query "Status" \
            --output text)
          
          echo "Status: $STATUS"
          
          echo "📊 Test data load output:"
          aws ssm get-command-invocation \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --command-id $COMMAND_ID \
            --query "StandardOutputContent" \
            --output text
          
          # Check if command succeeded
          if [ "$STATUS" != "Success" ]; then
            echo "❌ Command failed with status: $STATUS"
            echo "Error output:"
            aws ssm get-command-invocation \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --command-id $COMMAND_ID \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          
          echo "✅ Data loaded successfully to hcl_test schema"
      
      - name: Verify TEST schema (not production)
        run: |
          echo "🔍 Verifying hcl_test schema was updated..."
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu/H.C.-Lombardo-App && . venv/bin/activate && python -c \"import psycopg2; from db_config import DATABASE_CONFIG; conn = psycopg2.connect(**DATABASE_CONFIG); cur = conn.cursor(); cur.execute(\\\"SELECT COUNT(*) FROM hcl_test.games WHERE season=2025\\\"); test_count = cur.fetchone()[0]; cur.execute(\\\"SELECT COUNT(*) FROM hcl.games WHERE season=2025\\\"); prod_count = cur.fetchone()[0]; print(f\\\"TEST schema: {test_count} games (2025)\\\"); print(f\\\"PROD schema: {prod_count} games (2025)\\\"); print(f\\\"Production unchanged: YES\\\"); cur.close(); conn.close()\""
            ]' \
            --output text \
            --query "Command.CommandId")
          
          echo "Command ID: $COMMAND_ID"
          sleep 20
          
          STATUS=$(aws ssm get-command-invocation \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --command-id $COMMAND_ID \
            --query "Status" \
            --output text)
          
          echo "Status: $STATUS"
          
          echo "✅ Verification results:"
          aws ssm get-command-invocation \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --command-id $COMMAND_ID \
            --query "StandardOutputContent" \
            --output text
          
          if [ "$STATUS" != "Success" ]; then
            echo "❌ Verification failed with status: $STATUS"
            echo "Error output:"
            aws ssm get-command-invocation \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --command-id $COMMAND_ID \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
      
      - name: Test workflow summary
        run: |
          echo "🎯 TEST WORKFLOW COMPLETE"
          echo "✅ SSM connectivity verified"
          echo "✅ Latest code pulled from GitHub"
          echo "✅ Data loaded to hcl_test schema"
          echo "✅ Production schema UNTOUCHED"
          echo "✅ Safe to proceed with production workflow"
