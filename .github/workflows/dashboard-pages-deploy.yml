name: Dashboard Pages Deploy

on:
  pull_request:
    branches:
      - master
    paths:
      - Dashboard/index.html
      - Dashboard/DASHBOARD_UPDATE_GUIDE.md
      - docs/DASHBOARD_UPDATE_GUIDE.md
      - docs/SPRINT_EXECUTION_PROCESS.md
      - .github/workflows/dashboard-pages-deploy.yml
  push:
    branches:
      - master
    paths:
      - Dashboard/index.html
      - .github/workflows/dashboard-pages-deploy.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-pages-deploy
  cancel-in-progress: true

jobs:
  validate-dashboard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify dashboard source file exists
        run: |
          test -f Dashboard/index.html

      - name: Block legacy manual deploy command in docs
        run: |
          if grep -n -E "git show master:Dashboard/index\.html > index\.html|git checkout gh-pages" Dashboard/DASHBOARD_UPDATE_GUIDE.md docs/DASHBOARD_UPDATE_GUIDE.md docs/SPRINT_EXECUTION_PROCESS.md; then
            echo "Legacy manual gh-pages deploy command found."
            exit 1
          fi

  deploy-dashboard:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare gh-pages worktree
        run: |
          git fetch origin gh-pages
          git worktree add gh-pages-worktree gh-pages

      - name: Sync dashboard artifact
        run: |
          cp Dashboard/index.html gh-pages-worktree/index.html

      - name: Commit and push if changed
        run: |
          cd gh-pages-worktree
          if git diff --quiet -- index.html; then
            echo "No dashboard changes to deploy."
            exit 0
          fi

          git add index.html
          git commit -m "Deploy dashboard from ${GITHUB_SHA::7}"
          git push origin gh-pages
